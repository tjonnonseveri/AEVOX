<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Aevox</title>

		<!-- Polices Google -->
		<link
			href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
			rel="stylesheet"
		/>

		<!-- Feuille de style -->
		<link rel="stylesheet" href="style.css" />

		<!-- Google Sign-In -->
		<script src="https://accounts.google.com/gsi/client" async defer></script>
	</head>
	<body>
		<!-- ============================================
       ÉCRAN DE CHARGEMENT
       ============================================ -->
		<div id="loading-screen" class="loading-screen">
			<svg viewBox="0 0 40 40" fill="none" style="width: 56px; height: 56px">
				<circle
					cx="20"
					cy="20"
					r="19"
					fill="#0d0d0f"
					stroke="#7c6af7"
					stroke-width="1.2"
				/>
				<polygon
					points="20,4 36,20 20,36 4,20"
					fill="none"
					stroke="#7c6af7"
					stroke-width="1.5"
				/>
				<polygon
					points="20,10 30,20 20,30 10,20"
					fill="none"
					stroke="#7c6af7"
					stroke-width="1"
					opacity="0.5"
				/>
				<line
					x1="14"
					y1="14"
					x2="26"
					y2="26"
					stroke="#7c6af7"
					stroke-width="2.5"
					stroke-linecap="round"
				/>
				<line
					x1="26"
					y1="14"
					x2="14"
					y2="26"
					stroke="#7c6af7"
					stroke-width="2.5"
					stroke-linecap="round"
				/>
				<circle cx="20" cy="20" r="3" fill="#7c6af7" />
				<circle cx="20" cy="4" r="2" fill="#7c6af7" />
				<circle cx="36" cy="20" r="2" fill="#7c6af7" />
				<circle cx="20" cy="36" r="2" fill="#7c6af7" />
				<circle cx="4" cy="20" r="2" fill="#7c6af7" />
			</svg>
			<div class="spinner"></div>
			<div style="font-size: 14px">Chargement de Aevox...</div>
		</div>

		<!-- ============================================
       ÉCRAN D'AUTHENTIFICATION
       ============================================ -->
		<div id="auth-screen" style="display: none">
			<div class="auth-box">
				<!-- Logo -->
				<div class="auth-logo">
					<svg viewBox="0 0 40 40" fill="none">
						<circle
							cx="20"
							cy="20"
							r="19"
							fill="#0d0d0f"
							stroke="#7c6af7"
							stroke-width="1.2"
						/>
						<polygon
							points="20,4 36,20 20,36 4,20"
							fill="none"
							stroke="#7c6af7"
							stroke-width="1.5"
						/>
						<polygon
							points="20,10 30,20 20,30 10,20"
							fill="none"
							stroke="#7c6af7"
							stroke-width="1"
							opacity="0.5"
						/>
						<line
							x1="14"
							y1="14"
							x2="26"
							y2="26"
							stroke="#7c6af7"
							stroke-width="2.5"
							stroke-linecap="round"
						/>
						<line
							x1="26"
							y1="14"
							x2="14"
							y2="26"
							stroke="#7c6af7"
							stroke-width="2.5"
							stroke-linecap="round"
						/>
						<circle cx="20" cy="20" r="3" fill="#7c6af7" />
						<circle cx="20" cy="4" r="2" fill="#7c6af7" />
						<circle cx="36" cy="20" r="2" fill="#7c6af7" />
						<circle cx="20" cy="36" r="2" fill="#7c6af7" />
						<circle cx="4" cy="20" r="2" fill="#7c6af7" />
					</svg>
					<span>Aevox</span>
				</div>

				<!-- Onglets -->
				<div class="auth-tabs">
					<button class="auth-tab active" onclick="V.switchTab('login')">
						Connexion
					</button>
					<button class="auth-tab" onclick="V.switchTab('register')">
						Inscription
					</button>
				</div>

				<!-- Messages d'erreur / succès -->
				<div id="auth-msg"></div>

				<!-- Formulaire connexion -->
				<div id="login-form" class="auth-form">
					<input type="email" id="l-email" placeholder="Adresse e-mail" />
					<input
						type="password"
						id="l-pass"
						placeholder="Mot de passe"
						onkeydown="if (event.key === 'Enter') V.login();"
					/>
					<button class="btn-primary" onclick="V.login()">Se connecter</button>
					<div class="auth-divider">ou</div>
					<div
						id="g_login"
						style="display: flex; justify-content: center"
					></div>
				</div>

				<!-- Formulaire inscription -->
				<div id="register-form" class="auth-form" style="display: none">
					<input type="text" id="r-name" placeholder="Nom complet" />
					<input type="email" id="r-email" placeholder="Adresse e-mail" />
					<input
						type="password"
						id="r-pass"
						placeholder="Mot de passe (6 caractères min.)"
					/>
					<input
						type="password"
						id="r-conf"
						placeholder="Confirmer le mot de passe"
						onkeydown="if (event.key === 'Enter') V.register();"
					/>
					<button class="btn-primary" onclick="V.register()">
						Créer un compte
					</button>
					<div class="auth-divider">ou</div>
					<div
						id="g_register"
						style="display: flex; justify-content: center"
					></div>
				</div>
			</div>
		</div>

		<!-- ============================================
       APPLICATION PRINCIPALE
       ============================================ -->
		<div id="app" style="display: none">
			<div class="layout">
				<!-- ---- SIDEBAR (navigation gauche) ---- -->
				<nav class="sidebar">
					<!-- Logo -->
					<div class="sidebar-logo">
						<svg viewBox="0 0 40 40" fill="none">
							<circle
								cx="20"
								cy="20"
								r="19"
								fill="#0d0d0f"
								stroke="#7c6af7"
								stroke-width="1.2"
							/>
							<polygon
								points="20,4 36,20 20,36 4,20"
								fill="none"
								stroke="#7c6af7"
								stroke-width="1.5"
							/>
							<polygon
								points="20,10 30,20 20,30 10,20"
								fill="none"
								stroke="#7c6af7"
								stroke-width="1"
								opacity="0.5"
							/>
							<line
								x1="14"
								y1="14"
								x2="26"
								y2="26"
								stroke="#7c6af7"
								stroke-width="2.5"
								stroke-linecap="round"
							/>
							<line
								x1="26"
								y1="14"
								x2="14"
								y2="26"
								stroke="#7c6af7"
								stroke-width="2.5"
								stroke-linecap="round"
							/>
							<circle cx="20" cy="20" r="3" fill="#7c6af7" />
							<circle cx="20" cy="4" r="2" fill="#7c6af7" />
							<circle cx="36" cy="20" r="2" fill="#7c6af7" />
							<circle cx="20" cy="36" r="2" fill="#7c6af7" />
							<circle cx="4" cy="20" r="2" fill="#7c6af7" />
						</svg>
						<span>Aevox</span>
					</div>

					<!-- Navigation -->
					<div class="nav-item active" onclick="V.go('home')" id="nav-home">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
							<polyline points="9 22 9 12 15 12 15 22" />
						</svg>
						Accueil
					</div>

					<div class="nav-item" onclick="V.go('public')" id="nav-public">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<circle cx="12" cy="12" r="10" />
							<line x1="2" y1="12" x2="22" y2="12" />
							<path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20" />
						</svg>
						Public
					</div>

					<div class="nav-item" onclick="V.go('messages')" id="nav-messages">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path
								d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
							/>
						</svg>
						Messages
						<span class="nav-badge" id="nav-msg-badge" style="display: none"
							>0</span
						>
					</div>

					<div class="nav-item" onclick="V.go('groups')" id="nav-groups">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
							<circle cx="9" cy="7" r="4" />
							<path d="M23 21v-2a4 4 0 00-3-3.87" />
							<path d="M16 3.13a4 4 0 010 7.75" />
						</svg>
						Groupes
					</div>

					<div class="nav-item" onclick="V.go('search')" id="nav-search">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<circle cx="11" cy="11" r="8" />
							<line x1="21" y1="21" x2="16.65" y2="16.65" />
						</svg>
						Recherche
					</div>

					<div
						class="nav-item"
						onclick="V.go('notifications')"
						id="nav-notifications"
					>
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
							<path d="M13.73 21a2 2 0 01-3.46 0" />
						</svg>
						Notifications
						<span class="nav-badge" id="nav-notif-badge" style="display: none"
							>0</span
						>
					</div>

					<div class="nav-item" onclick="V.go('profile')" id="nav-profile">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
							<circle cx="12" cy="7" r="4" />
						</svg>
						Profil
					</div>

					<div class="nav-item" onclick="V.go('settings')" id="nav-settings">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<circle cx="12" cy="12" r="3" />
							<path
								d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83
              0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65
              1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65
              1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65
              1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65
              1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2
              2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65
              1.65 0 00-1.51 1z"
							/>
						</svg>
						Paramètres
					</div>

					<!-- Admin (visible uniquement pour les admins) -->
					<div
						class="nav-item"
						onclick="V.go('admin')"
						id="nav-admin"
						style="display: none"
					>
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
						</svg>
						Admin
					</div>

					<!-- Profil & déconnexion -->
					<div class="sidebar-bottom">
						<div class="sidebar-profile" onclick="V.go('profile')">
							<div class="avatar" id="sb-av">?</div>
							<div class="profile-info">
								<div class="profile-name" id="sb-name">Chargement...</div>
								<div class="profile-handle" id="sb-handle">@...</div>
							</div>
						</div>
						<div class="nav-item" onclick="V.logout()" style="margin-top: 4px">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
								<polyline points="16 17 21 12 16 7" />
								<line x1="21" y1="12" x2="9" y2="12" />
							</svg>
							Déconnexion
						</div>
					</div>
				</nav>

				<!-- ---- CONTENU PRINCIPAL ---- -->
				<main class="main">
					<div id="page-content"></div>
				</main>

				<!-- ---- PANNEAU DROIT ---- -->
				<aside class="right-panel" id="right-panel">
					<div class="rp-section">
						<div class="rp-title">En ligne</div>
						<div id="online-panel">
							<p style="font-size: 13px; color: var(--text3)">Chargement...</p>
						</div>
					</div>
					<div class="rp-section">
						<div class="rp-title">Tendances</div>
						<div id="trends-panel"></div>
					</div>
					<div class="rp-section">
						<div class="rp-title">Suggestions</div>
						<div id="suggestions-panel"></div>
					</div>
				</aside>
			</div>
		</div>

		<!-- ============================================
       MODALE (superposition)
       ============================================ -->
		<div
			class="modal-overlay"
			id="modal-overlay"
			style="display: none"
			onclick="V.closeModal(event)"
		>
			<div class="modal" id="modal-content"></div>
		</div>
