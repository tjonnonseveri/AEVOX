<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Aevox</title>

		<!-- Polices Google -->
		<link
			href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
			rel="stylesheet"
		/>

		<!-- Feuille de style -->
		<link rel="stylesheet" href="style.css" />

		<!-- Google Sign-In -->
		<script src="https://accounts.google.com/gsi/client" async defer></script>
	</head>
	<body>
		<!-- ============================================
       ÉCRAN DE CHARGEMENT
       ============================================ -->
		<div id="loading-screen" class="loading-screen">
			<svg viewBox="0 0 40 40" fill="none" style="width: 56px; height: 56px">
				<circle
					cx="20"
					cy="20"
					r="19"
					fill="#0d0d0f"
					stroke="#7c6af7"
					stroke-width="1.2"
				/>
				<polygon
					points="20,4 36,20 20,36 4,20"
					fill="none"
					stroke="#7c6af7"
					stroke-width="1.5"
				/>
				<polygon
					points="20,10 30,20 20,30 10,20"
					fill="none"
					stroke="#7c6af7"
					stroke-width="1"
					opacity="0.5"
				/>
				<line
					x1="14"
					y1="14"
					x2="26"
					y2="26"
					stroke="#7c6af7"
					stroke-width="2.5"
					stroke-linecap="round"
				/>
				<line
					x1="26"
					y1="14"
					x2="14"
					y2="26"
					stroke="#7c6af7"
					stroke-width="2.5"
					stroke-linecap="round"
				/>
				<circle cx="20" cy="20" r="3" fill="#7c6af7" />
				<circle cx="20" cy="4" r="2" fill="#7c6af7" />
				<circle cx="36" cy="20" r="2" fill="#7c6af7" />
				<circle cx="20" cy="36" r="2" fill="#7c6af7" />
				<circle cx="4" cy="20" r="2" fill="#7c6af7" />
			</svg>
			<div class="spinner"></div>
			<div style="font-size: 14px">Chargement de Aevox...</div>
		</div>

		<!-- ============================================
       ÉCRAN D'AUTHENTIFICATION
       ============================================ -->
		<div id="auth-screen" style="display: none">
			<div class="auth-box">
				<!-- Logo -->
				<div class="auth-logo">
					<svg viewBox="0 0 40 40" fill="none">
						<circle
							cx="20"
							cy="20"
							r="19"
							fill="#0d0d0f"
							stroke="#7c6af7"
							stroke-width="1.2"
						/>
						<polygon
							points="20,4 36,20 20,36 4,20"
							fill="none"
							stroke="#7c6af7"
							stroke-width="1.5"
						/>
						<polygon
							points="20,10 30,20 20,30 10,20"
							fill="none"
							stroke="#7c6af7"
							stroke-width="1"
							opacity="0.5"
						/>
						<line
							x1="14"
							y1="14"
							x2="26"
							y2="26"
							stroke="#7c6af7"
							stroke-width="2.5"
							stroke-linecap="round"
						/>
						<line
							x1="26"
							y1="14"
							x2="14"
							y2="26"
							stroke="#7c6af7"
							stroke-width="2.5"
							stroke-linecap="round"
						/>
						<circle cx="20" cy="20" r="3" fill="#7c6af7" />
						<circle cx="20" cy="4" r="2" fill="#7c6af7" />
						<circle cx="36" cy="20" r="2" fill="#7c6af7" />
						<circle cx="20" cy="36" r="2" fill="#7c6af7" />
						<circle cx="4" cy="20" r="2" fill="#7c6af7" />
					</svg>
					<span>Aevox</span>
				</div>

				<!-- Onglets -->
				<div class="auth-tabs">
					<button class="auth-tab active" onclick="V.switchTab('login')">
						Connexion
					</button>
					<button class="auth-tab" onclick="V.switchTab('register')">
						Inscription
					</button>
				</div>

				<!-- Messages d'erreur / succès -->
				<div id="auth-msg"></div>

				<!-- Formulaire connexion -->
				<div id="login-form" class="auth-form">
					<input type="email" id="l-email" placeholder="Adresse e-mail" />
					<input
						type="password"
						id="l-pass"
						placeholder="Mot de passe"
						onkeydown="if (event.key === 'Enter') V.login();"
					/>
					<button class="btn-primary" onclick="V.login()">Se connecter</button>
					<div class="auth-divider">ou</div>
					<div
						id="g_login"
						style="display: flex; justify-content: center"
					></div>
				</div>

				<!-- Formulaire inscription -->
				<div id="register-form" class="auth-form" style="display: none">
					<input type="text" id="r-name" placeholder="Nom complet" />
					<input type="email" id="r-email" placeholder="Adresse e-mail" />
					<input
						type="password"
						id="r-pass"
						placeholder="Mot de passe (6 caractères min.)"
					/>
					<input
						type="password"
						id="r-conf"
						placeholder="Confirmer le mot de passe"
						onkeydown="if (event.key === 'Enter') V.register();"
					/>
					<button class="btn-primary" onclick="V.register()">
						Créer un compte
					</button>
					<div class="auth-divider">ou</div>
					<div
						id="g_register"
						style="display: flex; justify-content: center"
					></div>
				</div>
			</div>
		</div>

		<!-- ============================================
       APPLICATION PRINCIPALE
       ============================================ -->
		<div id="app" style="display: none">
			<div class="layout">
				<!-- ---- SIDEBAR (navigation gauche) ---- -->
				<nav class="sidebar">

					<div class="sidebar-logo">

					<!-- Admin (visible uniquement pour les admins) -->
					<div
						class="nav-item"
						onclick="V.go('admin')"
						id="nav-admin"

						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"

							<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />

						Admin

					<div class="sidebar-bottom">
						<div class="sidebar-profile" onclick="V.showAccountMenu()">

								<div class="profile-handle" id="sb-handle">@...</div>
							</div>
							<svg
								style="
									margin-left: auto;
									color: var(--text3);
									width: 14px;
									height: 14px;
									flex-shrink: 0;
								"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"

								<circle cx="12" cy="12" r="1" />

								<circle cx="12" cy="19" r="1" />

							class="nav-item"
							onclick="V.showAccountMenu()"

							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />

								<line x1="21" y1="12" x2="9" y2="12" />

				<!-- ---- CONTENU PRINCIPAL ---- -->
				<main class="main">
					<div id="page-content"></div>
				</main>

				<!-- ---- PANNEAU DROIT ---- -->
				<aside class="right-panel" id="right-panel">
					<div class="rp-section">
						<div class="rp-title">En ligne</div>
						<div id="online-panel">
							<p style="font-size: 13px; color: var(--text3)">Chargement...</p>
						</div>
					</div>
					<div class="rp-section">
						<div class="rp-title">Tendances</div>
						<div id="trends-panel"></div>
					</div>
					<div class="rp-section">
						<div class="rp-title">Suggestions</div>
						<div id="suggestions-panel"></div>
					</div>
				</aside>

       MODALE (superposition)
       ============================================ -->
		<div
			class="modal-overlay"
			id="modal-overlay"
			style="display: none"
			onclick="V.closeModal(event)"
		>
			<div class="modal" id="modal-content"></div>
		</div>

       BARRE DE NAVIGATION MOBILE (visible < 480px)
       ============================================ -->

					fill="none"

					stroke-width="2"

				</svg>

					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
				>
					<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
				</svg>
				<span>Messages</span>
				<span class="mobile-nav-badge" id="mnav-msg-badge" style="display: none"

			<div
				class="mobile-nav-item"
				id="mnav-search"
				onclick="

				</svg>
				<span>Profil</span>
			</div>
		</nav>
